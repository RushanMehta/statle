<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>STATLE</h1>
        <nav class="sports-tabs">
            <button class="tab-btn active" data-sport="football">Football</button>
            <button class="tab-btn" data-sport="basketball">Basketball</button>
            <button class="tab-btn" data-sport="baseball">Baseball</button>
            <button class="tab-btn" data-sport="hockey">Hockey</button>
            <button class="tab-btn" data-sport="soccer">Soccer</button>
        </nav>
        <div id="guess-counter">Guesses: 0 / 8</div>
    </header>

    <div id="instructions-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">How To Play</h2>
            <p id="modal-text">Instructions go here.</p>
            <button id="close-modal-btn">Got It!</button>
        </div>
    </div>

    <main id="game-container">
        <section id="input-container">
            <div class="search-box">
                <input type="text" id="player-search" placeholder="Type an NFL player's name..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>
            <button id="submit-guess">Guess</button>
        </section>

        <section id="results-container">
            <div class="results-header">
                <span>Player</span>
                <span>Pos</span>
                <span>Yds</span>
                <span>TDs</span>
                <span>#</span>
                <span>Age</span>
            </div>
            <div id="guesses-rows"></div>
        </section>
    </main>

    <script src="players.js"></script>
    <script src="script.js"></script>
</body>
</html>
